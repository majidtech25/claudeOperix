<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- SEO -->
    <title>Operix — Retail Management Software for Kenyan Businesses</title>
    <meta name="description" content="Operix is a complete retail management system for Kenyan shops and supermarkets. POS, inventory control, daily sales reports, and team management — all in one platform." />
    <meta name="keywords" content="retail management software Kenya, POS system Kenya, inventory management Kenya, sales tracking software, stock control system, shop management Nairobi, supermarket software Kenya, M-Pesa POS" />
    <meta name="author" content="Operix" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:type"        content="website" />
    <meta property="og:url"         content="https://operix.co.ke" />
    <meta property="og:title"       content="Operix — Run Your Business Like a CFO" />
    <meta property="og:description" content="Complete retail management for Kenyan businesses. POS, inventory, reports and team tracking in one place." />
    <meta property="og:locale"      content="en_KE" />

    <!-- Twitter -->
    <meta name="twitter:card"        content="summary_large_image" />
    <meta name="twitter:title"       content="Operix — Retail Management Software Kenya" />
    <meta name="twitter:description" content="POS, inventory, sales reports and staff tracking for Kenyan retailers." />

    <!-- Canonical -->
    <link rel="canonical" href="https://operix.co.ke" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@600;700;800&family=DM+Mono:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
    <link rel="manifest" href="/manifest.json" />
    <!--Manifest link and register SW-->
    <meta name="theme-color" content="#6ee7b7" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Operix" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/sw.js')
            .then(reg => console.log('[SW] Registered:', reg.scope))
            .catch(err => console.warn('[SW] Failed:', err))
        })
      }
    </script>
  </body>
</html>
