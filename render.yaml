services:
  - type: web
    name: operix-backend
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app.main:app -w 2 -k uvicorn.workers.UvicornWorker --bind 0.0.0.0:$PORT
    envVars:
      - key: SECRET_KEY
        generateValue: true
      - key: DATABASE_URL
        fromDatabase:
          name: operix-db
          property: connectionString
      - key: DEBUG
        value: "false"
      - key: MPESA_CONSUMER_KEY
        sync: false
      - key: MPESA_CONSUMER_SECRET
        sync: false
      - key: MPESA_SHORTCODE
        value: "174379"
      - key: MPESA_PASSKEY
        value: "bfb279f9aa9bdbcf158e97dd71a467cd2e0c893059b10f78e6b72ada1ed2c919"
      - key: MPESA_CALLBACK_URL
        sync: false
      - key: MPESA_ENV
        value: "sandbox"
      - key: STRIPE_SECRET_KEY
        sync: false
      - key: STRIPE_PUBLISHABLE_KEY
        sync: false
      - key: STRIPE_WEBHOOK_SECRET
        sync: false
      - key: STRIPE_SUCCESS_URL
        sync: false
      - key: STRIPE_CANCEL_URL
        sync: false
      - key: PLAN_BASIC_PRICE_KES
        value: "2500"
      - key: PLAN_PRO_PRICE_KES
        value: "6500"

  - type: web
    name: operix-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          name: operix-backend
          type: web
          property: host
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: operix-db
    plan: free
    databaseName: operix
